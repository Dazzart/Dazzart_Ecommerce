server {
    listen 80;
    server_name localhost;

    location / {
        root /usr/share/nginx/html;
        index index.html index.htm;
        # Esto es vital para que al recargar la página en React no te de 404
        try_files $uri $uri/ /index.html;
    }

    # Opcional: Para que los errores de Nginx no den pistas al usuario
    error_page 500 502 503 504 /50x.html;
    location = /50x.html {
        root /usr/share/nginx/html;
    }
}